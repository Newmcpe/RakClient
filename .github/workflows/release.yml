name: Release

# Build the `rakclient` binary and open a DRAFT GitHub Release when a version tag is pushed.
# Trigger it with e.g. `git tag 0.1.0 && git push origin 0.1.0` (or `v0.1.0`).
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release + upload assets via GITHUB_TOKEN

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            bin: rakclient
            archive: rakclient-${{ github.ref_name }}-linux-x86_64.tar.gz
          - os: windows-latest
            name: windows-x86_64
            bin: rakclient.exe
            archive: rakclient-${{ github.ref_name }}-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # mlua's vendored Luau builds C++; the runners' default toolchains (gcc / MSVC) cover it.
      - name: Build release binary
        run: cargo build --release -p app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -C target/release -czf "${{ matrix.archive }}" "${{ matrix.bin }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/release/${{ matrix.bin }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Collect built archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: RakClient ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
